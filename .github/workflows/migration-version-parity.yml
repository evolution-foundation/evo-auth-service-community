name: Migration version parity

# EVO-2090: auth and evo-ai-crm-community share ONE `schema_migrations` table
# (same database). A reused version makes Rails skip the second app's migration ->
# missing DDL -> boot crash (messages.source, EVO-1911). Each app owns a disjoint
# slice of the version space so collisions are impossible by construction:
#   * auth (this repo) -> ODD  versions
#   * CRM              -> EVEN versions
# This job FAILS the PR if a migration created under the convention (version >=
# CUTOFF) is EVEN. Older migrations are grandfathered. Runs without Rails/DB — it
# only scans db/migrate filenames — so it is fast and cannot be skipped by the
# (partial) RSpec CI. Mirrored in the CRM repo (EVEN) and backstopped by the
# monorepo guard (evolution-foundation/evo-crm-community).

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check migration version parity (auth = ODD)
        run: |
          set -euo pipefail
          cutoff=20260713000000
          bad="$(ls db/migrate 2>/dev/null | grep -oE '^[0-9]{14}' \
                 | awk -v c="$cutoff" '$1>=c { if (substr($0,14,1)%2==0) print $0 }')"
          if [ -n "$bad" ]; then
            echo "::error::EVO-2090: auth owns ODD migration versions (CRM owns EVEN)."
            echo "The following are EVEN and >= $cutoff, so they can collide with a CRM migration in the shared schema_migrations table:"
            echo "$bad" | sed 's/^/  /'
            echo "Fix: bump the migration timestamp by 1 second so its version is odd."
            exit 1
          fi
          echo "OK: no EVEN migration >= $cutoff — auth parity respected."
